# ============================================================================
# FraudShield — Threshold & Rule Configuration
# ============================================================================
# This file externalizes all tunable parameters so that fraud analysts
# can adjust sensitivity without touching code or retraining models.
# ============================================================================

# ---------------------------------------------------------------------------
# Risk Classification Thresholds
# ---------------------------------------------------------------------------
# score < low_max         → Low risk  (auto-approve candidates)
# low_max ≤ score < high_min → Medium risk (manual review)
# score ≥ high_min        → High risk (block / investigate)
risk_thresholds:
  low_max: 0.30
  high_min: 0.70

# ---------------------------------------------------------------------------
# ML Ensemble Weights
# ---------------------------------------------------------------------------
# Weights must sum to 1.0. If a model is unavailable at runtime,
# remaining weights are re-normalized automatically.
ensemble_weights:
  isolation_forest: 0.25
  logistic_regression: 0.45
  xgboost: 0.30

# ---------------------------------------------------------------------------
# Rule Engine Configuration
# ---------------------------------------------------------------------------
rule_engine:
  enabled: true

  # ---- Hard Block Rules (instant reject, no override) ----
  hard_block:
    # R001: Velocity circuit-breaker
    max_velocity_1h: 15

    # R002: Amount ceiling
    max_amount: 25000

    # R003: Geographic impossibility
    max_distance_km: 10000

  # ---- Escalation Rules (boost ML score) ----
  escalation:
    # R004: Night + International + Card-Not-Present combo
    night_intl_cnp_boost: 0.30

    # R005: Amount > N× average
    amount_spike_multiplier: 10
    amount_spike_boost: 0.25

    # R006: Rapid micro-transactions (card testing)
    micro_txn_velocity_min: 8
    micro_txn_amount_max: 5
    micro_txn_boost: 0.20

    # R007: Round amount + international
    round_intl_boost: 0.15

  # ---- Auto-Approve Rules (fast-track low-risk) ----
  auto_approve:
    # R008: Small, low-score transactions
    max_amount: 50
    max_score: 0.15
