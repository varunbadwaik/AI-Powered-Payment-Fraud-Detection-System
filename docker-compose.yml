# =============================================================================
# Docker Compose for AI-Powered Payment Fraud Detection System
# =============================================================================
#
# Usage:
#   docker-compose up --build         # Build and start all services
#   docker-compose up -d              # Start in background
#   docker-compose down               # Stop all services
#
# =============================================================================

version: "3.9"

services:
  # --------------------------------------------------------------------------
  # FastAPI Backend API
  # --------------------------------------------------------------------------
  backend:
    build:
      context: .
      target: api
    container_name: fraud-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DB_PATH=/app/data/fraud_detection.db
      - MODEL_DIR=/app/models/artifacts
      - LOG_LEVEL=INFO
    volumes:
      - db_data:/app/data
      - model_artifacts:/app/models/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; requests.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --------------------------------------------------------------------------
  # Streamlit Frontend Dashboard
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: .
      target: dashboard
    container_name: fraud-dashboard
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - STREAMLIT_PORT=8501
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  model_artifacts:
